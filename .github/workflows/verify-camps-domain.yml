# Temporary: diagnose stuck HTTPS provisioning for camps.mintresearch.org.
# Delete after use.
name: Verify camps subdomain
on:
  push:
    paths:
      - '.github/workflows/verify-camps-domain.yml'

permissions:
  pages: read
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Pages API state
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -sS -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${GITHUB_REPOSITORY}/pages | \
            python3 -c 'import json,sys; d=json.load(sys.stdin); print(json.dumps({k: d.get(k) for k in ["url","status","cname","custom_404","html_url","source","protected_domain_state","pending_domain_unverified_at","https_certificate","https_enforced"]}, indent=2))'
      - name: DNS + CAA
        run: |
          sudo apt-get install -yq dnsutils >/dev/null 2>&1 || true
          echo '--- CNAME chain ---'; dig +short camps.mintresearch.org CNAME; dig +short camps.mintresearch.org A; dig +short camps.mintresearch.org AAAA
          echo '--- CAA apex ---'; dig +short mintresearch.org CAA
          echo '--- CAA subdomain ---'; dig +short camps.mintresearch.org CAA
      - name: Plain HTTP + github.io behavior
        run: |
          curl -sS -o /dev/null -D - --max-time 15 http://camps.mintresearch.org/ | head -12 || true
          echo '---'
          curl -sS -o /dev/null -D - --max-time 15 https://mint-philosophy.github.io/mint-website/ | head -8 || true
