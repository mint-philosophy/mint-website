# Temporary: re-register camps.mintresearch.org on the Pages site via the
# API (the CNAME-file path no longer registers domains on existing sites),
# then report certificate state. Delete after use. Check-in probe 1.
name: Verify camps subdomain
on:
  push:
    paths:
      - '.github/workflows/verify-camps-domain.yml'

permissions:
  pages: write
  contents: read

jobs:
  set-domain:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Set custom domain via Pages API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          code=$(curl -sS -o resp.json -w '%{http_code}' -X PUT \
            -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${GITHUB_REPOSITORY}/pages \
            -d '{"cname":"camps.mintresearch.org"}')
          echo "PUT status: $code"; cat resp.json || true
      - name: Report domain + certificate state
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for i in 1 2 3 4 5 6; do
            sleep 20
            curl -sS -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" \
              https://api.github.com/repos/${GITHUB_REPOSITORY}/pages | \
              python3 -c 'import json,sys; d=json.load(sys.stdin); print(json.dumps({"cname": d.get("cname"), "protected_domain_state": d.get("protected_domain_state"), "https_certificate": d.get("https_certificate"), "https_enforced": d.get("https_enforced")}))'
          done
