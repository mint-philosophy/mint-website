name: Deploy camps hub to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'assets/data/camps.json'
      - 'assets/js/camps-hub.js'
      - 'assets/css/camps-hub.css'
      - '.github/pages/**'
      - '.github/workflows/deploy-camps-pages.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Assemble static site
        run: |
          mkdir -p site/assets/css site/assets/js site/assets/data site/assets/images
          cp .github/pages/index.html site/index.html
          cp assets/css/camps-hub.css site/assets/css/
          cp assets/js/camps-hub.js site/assets/js/
          cp assets/data/camps.json site/assets/data/
          cp assets/images/favicon.png site/assets/images/
          echo 'camps.mintresearch.org' > site/CNAME
          touch site/.nojekyll
      - name: Push to gh-pages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd site
          git init -q -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -qm "Deploy camps hub from ${GITHUB_SHA:0:7}"
          git push -f "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
