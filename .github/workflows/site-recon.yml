name: Site recon

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['.github/workflows/site-recon.yml']

permissions:
  contents: read

jobs:
  recon:
    runs-on: ubuntu-latest
    steps:
      - name: Survey what actually serves mintresearch.org
        run: |
          echo "===== apex headers ====="
          curl -sSI https://mintresearch.org/ | sed -n '1,12p' || true
          echo "===== apex title + generator ====="
          BODY=$(curl -sSL https://mintresearch.org/ || true)
          echo "$BODY" | grep -oiE '<title>[^<]*</title>' | head -1 || echo "(no title found)"
          echo "$BODY" | grep -oiE '<meta name="generator"[^>]*>' | head -2 || echo "(no generator meta)"
          echo "===== apex first 1200 chars ====="
          echo "$BODY" | head -c 1200; echo
          echo "===== apex nav links ====="
          echo "$BODY" | grep -oE 'href="[^"]+"' | sort -u | head -25 || true
          echo "===== legacy Ghost routes ====="
          for p in /ghost/ /newsletter/ /feed/ /camps/ /coquelin/; do
            printf '%s: ' "$p"
            curl -sS -o /dev/null -w '%{http_code}\n' "https://mintresearch.org$p" || true
          done
          echo "===== www ====="
          curl -sSI https://www.mintresearch.org/ | sed -n '1,6p' || true
          echo "===== camps subdomain (expect DNS failure until record added) ====="
          curl -sSI --max-time 10 https://camps.mintresearch.org/ 2>&1 | head -4 || true
          echo "===== github.io project site (expect redirect to camps domain) ====="
          curl -sSI https://mint-philosophy.github.io/mint-website/ | sed -n '1,8p' || true
          echo "===== curator ====="
          curl -sSI --max-time 10 https://curator.mintresearch.org/ 2>&1 | head -8 || true
